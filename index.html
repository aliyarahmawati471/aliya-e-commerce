<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuketKu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#fafafa;
}

/* HEADER */
header{
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header h1{
    color:#e91e63;
}

nav a{
    margin:0 10px;
    text-decoration:none;
    color:#333;
    font-weight:bold;
}

nav a:hover{
    color:#e91e63;
}

/* HERO */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:40px;
    background:#fde4ec;
    flex-wrap:wrap;
}

.hero-text{
    max-width:500px;
}

.hero button{
    padding:10px 20px;
    background:#e91e63;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.hero img{
    width:320px;
    border-radius:10px;
}

/* PRODUK */
.products{
    padding:40px;
    text-align:center;
}

.products h2{
    margin-bottom:10px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.product{
    background:#fff;
    padding:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.product:hover{
    transform:translateY(-5px);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.product h3{
    margin:10px 0;
}

.product p{
    color:#e91e63;
    font-weight:bold;
}

.product button{
    margin-top:10px;
    background:#e91e63;
    color:white;
    border:none;
    padding:8px;
    border-radius:5px;
    width:100%;
    cursor:pointer;
}

/* FOOTER */
footer{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero img{
        margin-top:20px;
        width:100%;
    }
}
</style>
</head>

<body>

<header>
    <h1>BuketKu</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Produk</a>
        <a href="#">Kategori</a>
        <a href="#">Keranjang</a>
    </nav>
</header>

<main>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h2>Selamat Datang di Toko Buket</h2>
        <p>Buket cantik untuk semua momen spesial</p>
        <button>Belanja Sekarang</button>
    </div>

    <!-- GANTI GAMBAR HERO -->
    <img src="image1.jpg" alt="Buket">
</section>

<!-- PRODUK -->
<section class="products">
<h2>Produk Unggulan</h2>

<div class="product-grid">

<div class="product">
    <img src="image1.jpg">
    <h3>Buket Mawar</h3>
    <p>Rp 150.000</p>
    <button>Tambah ke Keranjang</button>
</div>

<div class="product">
    <img src="image2.jpg">
    <h3>Buket Wisuda</h3>
    <p>Rp 200.000</p>
    <button>Tambah ke Keranjang</button>
</div>

<div class="product">
    <img src="image3.jpg">
    <h3>Buket Uang</h3>
    <p>Rp 250.000</p>
    <button>Tambah ke Keranjang</button>
</div>

<div class="product">
    <img src="image4.jpg">
    <h3>Buket Snack</h3>
    <p>Rp 180.000</p>
    <button>Tambah ke Keranjang</button>
</div>

</div>
</section>

</main>

<footer>
<p>Kontak: 0812-3456-7890</p>
<p>&copy; 2026 BuketKu</p>
</footer>

</body>
</html>
